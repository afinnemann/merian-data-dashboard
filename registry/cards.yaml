  - id: clh-nl-0001
    title: RIVM Luchtmeetnet
    country: NL
    domain: pollution
    purpose: "Dutch national air-quality monitoring network, real-time + historical, open API."
    variables: [PM2.5, PM10, NO2, O3, SO2, CO, BC]
    spatial_resolution: station
    temporal_resolution: hourly
    period: "2013-present"
    extent: "Netherlands (~80 stations)"
    url: "https://www.luchtmeetnet.nl/open-data"
    doi: null
    licence_spdx: "CC-BY-4.0"
    attribution_text: "RIVM. Luchtmeetnet open data. https://www.luchtmeetnet.nl"
    access_method: http_direct
    auth_required: false
    auth_instructions: null
    r_package: null
    linkable_to: ["clh-nl-0007"]
    curated_by: "NL Generator agent (scheduled run, 2026-05-07)"
    reviewed_by: "pending consortium consultation"
    last_verified: "2026-05-07"
    next_review_date: null
    snippet_r: |
      # RIVM Luchtmeetnet — Dutch national air-quality network, open REST API.
      # Station codes are strings like "NL49017"; no API key required.
      library(httr2)
      library(dplyr)

      # Fetch hourly NO2 for Amsterdam-Vondelpark (NL49017), 15 Jan 2024.
      resp <- request("https://api.luchtmeetnet.nl/open_api/measurements") |>
        req_url_query(
          station_number = "NL49017",
          formula        = "NO2",
          start          = "2024-01-15T00:00:00",
          end            = "2024-01-15T23:59:59",
          page           = 1
        ) |>
        req_perform() |>
        resp_body_json()

      # resp$data is a list of hourly records; bind into a tidy tibble.
      meas <- dplyr::bind_rows(resp$data)
      head(meas)
    gotchas: "Default page size is 100 records — add pagination if requesting multi-day windows; station codes are zero-padded strings (e.g. 'NL49017'), not integers."
    expected_runtime: "3-8 s for one station-day"

  - id: clh-nl-0002
    title: KNMI station data (Daggegevens)
    country: NL
    domain: heat
    purpose: "KNMI official meteorological station records, daily, automated stations across the Netherlands."
    variables: [tmax, tmin, tmean, precip, humidity, wind]
    spatial_resolution: station
    temporal_resolution: "daily (hourly available separately)"
    period: "1901-present (varies by station)"
    extent: "Netherlands (~50 active stations)"
    url: "https://www.knmi.nl/nederland-nu/klimatologie/daggegevens"
    doi: null
    licence_spdx: "CC-BY-4.0"
    attribution_text: "KNMI. Daggegevens van het weer in Nederland."
    access_method: http_direct
    auth_required: false
    auth_instructions: null
    r_package: null
    linkable_to: ["clh-nl-0007"]
    curated_by: "NL Generator agent (scheduled run, 2026-05-07)"
    reviewed_by: "pending consortium consultation"
    last_verified: "2026-05-07"
    next_review_date: null
    snippet_r: |
      # KNMI Daggegevens — official Dutch daily meteorology via POST request.
      # Station codes are 3-digit integers (260 = De Bilt); values in 0.1 units.
      library(httr2)

      raw <- request("https://www.daggegevens.knmi.nl/klimatologie/daggegevens") |>
        req_method("POST") |>
        req_body_form(
          stns = "260", vars = "TG:TX:TN:RH",
          byear = "2024", bmonth = "1", bday = "1",
          eyear = "2024", emonth = "1", eday = "1"
        ) |>
        req_perform() |>
        resp_body_string()

      # Response has "#"-prefixed comment lines; last such line (STN,YYYYMMDD,...) holds column names.
      lines     <- strsplit(raw, "\n")[[1]]
      hdr       <- sub("^# *", "", grep("^# *STN,", lines, value = TRUE)[1])
      col_names <- trimws(strsplit(hdr, ",")[[1]])
      data_csv  <- paste(lines[!grepl("^#|^\\s*$", lines)], collapse = "\n")
      df <- read.csv(text = data_csv, header = FALSE, col.names = col_names,
                     strip.white = TRUE)
      # Note: TG/TX/TN are in 0.1 °C; RH (precip sum) is in 0.1 mm.
      head(df)
    gotchas: "All numeric values are in 0.1 units (°C, mm) — divide by 10 before analysis; station IDs are plain integers, not text codes."
    expected_runtime: "5-10 s for one station-month via POST"

  - id: clh-nl-0007
    title: CBS Doodsoorzakenstatistiek
    country: NL
    domain: health
    purpose: "Dutch national cause-of-death statistics, by ICD-10 cause, week or month, age, sex."
    variables: [deaths_by_cause]
    spatial_resolution: "national / regional"
    temporal_resolution: "weekly / monthly"
    period: "1995-present"
    extent: "Netherlands"
    url: "https://opendata.cbs.nl/statline/#/CBS/nl/dataset/70895NED/table"
    doi: null
    licence_spdx: "CC-BY-4.0"
    attribution_text: "CBS. Doodsoorzaken; geslacht en leeftijd (StatLine, 70895NED). https://opendata.cbs.nl"
    access_method: http_direct
    auth_required: false
    auth_instructions: null
    r_package: "cbsodataR"
    linkable_to: ["clh-nl-0001", "clh-nl-0002"]
    curated_by: "NL Generator agent (scheduled run, 2026-05-07)"
    reviewed_by: "pending consortium consultation"
    last_verified: "2026-05-07"
    next_review_date: null
    snippet_r: |
      # CBS Doodsoorzakenstatistiek — Dutch cause-of-death via cbsodataR.
      # Table 70895NED supersedes the older 7233. Verify with cbs_get_toc() if in doubt.
      library(cbsodataR)
      library(dplyr)

      # Optional discovery step: uncomment to confirm current table ID.
      # cbs_get_toc(Language = "nl") |> dplyr::filter(grepl("doodsoorzaak", tolower(Title)))

      # Inspect metadata once to understand available filter codes and dimensions.
      meta <- cbs_get_meta("70895NED")

      # Fetch 2022 annual totals; annual periods contain "JJ" in their code.
      deaths <- cbs_get_data(
        "70895NED",
        Perioden = has_substring("2022JJ"),
        select    = c("Perioden", "Geslacht", "DoodsoorzaakICDCode", "Overledenen_1")
      )

      # T001038 = totaal geslacht (both sexes combined).
      deaths |> dplyr::filter(Geslacht == "T001038") |> head()
    gotchas: "CBS suppresses counts below a confidentiality threshold (~5–10), so small-cause regional cells will be NA; old table 7233 is superseded — use 70895NED."
    expected_runtime: "10-25 s for one annual slice"
